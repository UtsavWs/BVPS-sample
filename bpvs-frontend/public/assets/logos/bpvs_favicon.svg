<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Central hub node (business/connection center) -->
  <circle cx="16" cy="16" r="3.5" fill="url(#accentGrad)"/>

  <!-- Top person (family member) -->
  <circle cx="16" cy="5.5" r="2.2" fill="white" opacity="0.95"/>
  <path d="M12.5 11.5 Q16 9.5 19.5 11.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Bottom-left person -->
  <circle cx="7" cy="22" r="2.2" fill="white" opacity="0.95"/>
  <path d="M4.5 27.5 Q7 25.5 9.5 27.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Bottom-right person -->
  <circle cx="25" cy="22" r="2.2" fill="white" opacity="0.95"/>
  <path d="M22.5 27.5 Q25 25.5 27.5 27.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.95"/>

  <!-- Connection lines from hub to each person -->
  <!-- Top -->
  <line x1="16" y1="7.7" x2="16" y2="12.5" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Bottom-left -->
  <line x1="14.5" y1="18.7" x2="8.5" y2="21" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <!-- Bottom-right -->
  <line x1="17.5" y1="18.7" x2="23.5" y2="21" stroke="#FBBF24" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

  <!-- Small node dots on connection lines (business link indicators) -->
  <circle cx="16" cy="10" r="1" fill="#FBBF24" opacity="0.7"/>
  <circle cx="11.5" cy="20.2" r="1" fill="#FBBF24" opacity="0.7"/>
  <circle cx="20.5" cy="20.2" r="1" fill="#FBBF24" opacity="0.7"/>
</svg>
